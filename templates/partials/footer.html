{{ define "footer" }}
    <!-- Script HTMX JSON-enc global -->
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    
    <!-- Script applicatif global -->
    <script src="/static/js/app.js" defer></script>

    <!-- Intercepteur d'erreurs global pour tous les formulaires HTMX -->
    <script>
        document.body.addEventListener('htmx:responseError', function(evt) {
            try {
                const response = JSON.parse(evt.detail.xhr.response);
                const triggerEl = evt.detail.elt;
                // On cherche d'abord la boîte d'erreur à l'intérieur de l'élément émetteur (formulaire)
                const errorBox = triggerEl.querySelector('.error-box') || triggerEl.querySelector('[id^="error-"]') || document.querySelector('.error-box') || document.getElementById('form-error');
                if (response.error && errorBox) {
                    errorBox.innerText = "❌ " + response.error;
                }
            } catch (e) {
                const triggerEl = evt.detail.elt;
                const errorBox = triggerEl.querySelector('.error-box') || triggerEl.querySelector('[id^="error-"]') || document.querySelector('.error-box') || document.getElementById('form-error');
                if (errorBox) {
                    errorBox.innerText = "❌ Une erreur de communication est survenue.";
                }
            }
        });

        // Quand on relance une requête, on nettoie le message d'erreur précédent
        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            const triggerEl = evt.detail.elt;
            const errorBox = triggerEl.querySelector('.error-box') || triggerEl.querySelector('[id^="error-"]') || document.querySelector('.error-box') || document.getElementById('form-error');
            if (errorBox) {
                errorBox.innerText = "";
            }
        });
    </script>
{{ end }}
