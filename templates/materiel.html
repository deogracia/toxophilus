<!DOCTYPE html>
<html lang="fr">
{{ template "head" . }}
<body>
    <main class="container">
        {{ template "nav" . }}

        <section>
            <h2>🏹 Inventaire du Matériel</h2>
            <p>Gestion des arcs d'initiation et de prêt.</p>

            <div class="grid">
                <article>
                    <header>
                        <h3>Poignées (Risers)</h3>
                    </header>
                    <figure>
                        <table class="striped">
                            <thead>
                                <tr>
                                    <th>Réf.</th>
                                    <th>Modèle</th>
                                    <th>Latéralité</th>
                                    <th>Taille</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{ range .poignees }}
                                <tr>
                                    <td><strong>{{ .Reference }}</strong></td>
                                    <td>{{ .Marque }} {{ .Modele }}</td>
                                    <td>{{ .Lateralite }}</td>
                                    <td>{{ .Taille }}</td>
                                </tr>
                                {{ else }}
                                <tr><td colspan="4" style="text-align: center;">Aucune poignée en stock.</td></tr>
                                {{ end }}
                            </tbody>
                        </table>
                    </figure>
                </article>

                <article>
                    <header>
                        <h3>Branches (Limbs)</h3>
                    </header>
                    <figure>
                        <table class="striped">
                            <thead>
                                <tr>
                                    <th>Réf.</th>
                                    <th>Modèle</th>
                                    <th>Puissance</th>
                                    <th>Taille</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{ range .branches }}
                                <tr>
                                    <td><strong>{{ .Reference }}</strong></td>
                                    <td>{{ .Marque }} {{ .Modele }}</td>
                                    <td>{{ .Puissance }} lbs</td>
                                    <td>{{ .Taille }}</td>
                                </tr>
                                {{ else }}
                                <tr><td colspan="4" style="text-align: center;">Aucune branche en stock.</td></tr>
                                {{ end }}
                            </tbody>
                        </table>
                    </figure>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
