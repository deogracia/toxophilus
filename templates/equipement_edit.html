<!DOCTYPE html>
<html lang="fr">
{{ template "head" . }}
<body>
    <main class="container">
        {{ template "nav" . }}

        <section>
            <h2>✏️ {{ .titre }}</h2>
            <p>Modification des informations du matériel.</p>

            {{ if eq .type "riser" }}
            <form hx-put="/api/risers/{{ .item.ID }}" hx-ext="json-enc">
            {{ else }}
            <form hx-put="/api/limbs/{{ .item.ID }}" hx-ext="json-enc">
            {{ end }}
                <div class="grid">
                    <label>Numéro de série
                        <input type="text" name="numero_serie" value="{{ .item.NumeroSerie }}" required>
                    </label>
                    <label>Marque
                        <input type="text" name="marque" value="{{ .item.Marque }}" required>
                    </label>
                    <label>Modèle
                        <input type="text" name="modele" value="{{ .item.Modele }}">
                    </label>
                </div>

                <div class="grid">
                    <label>Taille
                        <input type="text" name="taille" value="{{ .item.Taille }}">
                    </label>

                    {{ if eq .type "riser" }}
                    <label>Latéralité
                        <select name="lateralite">
                            <option value="Droitier" {{ if eq .item.Lateralite "Droitier" }}selected{{ end }}>Droitier</option>
                            <option value="Gaucher" {{ if eq .item.Lateralite "Gaucher" }}selected{{ end }}>Gaucher</option>
                        </select>
                    </label>
                    <label>Couleur
                        <input type="text" name="couleur" value="{{ .item.Couleur }}">
                    </label>
                    {{ end }}

                    {{ if eq .type "limb" }}
                    <label>Puissance (lbs)
                        <input type="number" name="puissance" value="{{ .item.Puissance }}" min="12" max="40" step="2" required>
                    </label>
                    {{ end }}
                </div>

                <div class="grid">
                    <label>Année d'achat
                        <input type="number" name="annee_achat" value="{{ if ne .item.AnneeAchat 0 }}{{ .item.AnneeAchat }}{{ end }}" min="1970" max="2500" step="1">
                    </label>
                    <label>Prix d'achat (€)
                        <input type="number" name="prix" value="{{ if ne .item.Prix 0.0 }}{{ .item.Prix }}{{ end }}" min="0.00" step="0.01">
                    </label>
                </div>

                {{ if eq .type "limb" }}
                <label>Commentaire
                    <input type="text" name="commentaire" value="{{ .item.Commentaire }}">
                </label>
                {{ end }}

                <div id="error-edit" style="color: var(--pico-del-color); margin-bottom: 1rem; font-weight: bold;"></div>

                <div class="grid">
                    <button type="submit">💾 Enregistrer les modifications</button>
                    <a href="/equipement" role="button" class="secondary outline">Annuler</a>
                </div>
            </form>
        </section>
    </main>

    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    <script>
        document.body.addEventListener('htmx:responseError', function(evt) {
            try {
                const response = JSON.parse(evt.detail.xhr.response);
                if (response.error) {
                    const errorDiv = document.getElementById('error-edit');
                    if(errorDiv) errorDiv.innerText = "❌ " + response.error;
                }
            } catch (e) {
                console.error(e);
            }
        });

        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            const errorDiv = document.getElementById('error-edit');
            if(errorDiv) errorDiv.innerText = "";
        });
    </script>
</body>
</html>
