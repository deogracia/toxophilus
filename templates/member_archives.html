<!DOCTYPE html>
<html lang="fr">
{{ template "head" . }}
<body>
    <main class="container">
        {{ template "nav" . }}
        <hr>
        <section>
            <h2>🗃️ Archives du Club</h2>
            <p><a href="/members" class="secondary">← Retour aux membres actifs</a></p>
            
            <figure>
                <table class="striped">
                    <thead>
                        <tr>
                            <th>Code Adhérent</th>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{ range .membres }}
                        <tr>
                            <td><strong>{{ .CodeAdherent }}</strong></td>
                            <td>{{ .Nom }}</td>
                            <td>{{ .Prenom }}</td>
                            <td>
                                <div class="table-actions">
                                    <button class="outline btn-compact" 
                                            hx-put="/api/members/{{ .ID }}/reactivate" 
                                            hx-target="closest tr" 
                                            hx-swap="delete" 
                                            hx-confirm="Réactiver {{ .Prenom }} {{ .Nom }} ?">
                                        Réactiver
                                    </button>
                                    <button class="outline contrast btn-compact"
                                            hx-delete="/api/members/{{ .ID }}/hard"
                                            hx-target="closest tr"
                                            hx-swap="delete"
                                            hx-confirm="ATTENTION : Cette action est irréversible. Toutes les données de {{ .Prenom }} {{ .Nom }} seront supprimées. Confirmer ?">
                                        Supprimer Définitivement
                                    </button>
                                </div>
                            </td>
                        </tr>
                        {{ else }}
                        <tr><td colspan="4" class="text-center">Aucun archer dans les archives.</td></tr>
                        {{ end }}
                    </tbody>
                </table>
            </figure>
        </section>
    </main>

    {{ template "footer" . }}
</body>
</html>
