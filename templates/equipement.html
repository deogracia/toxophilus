<!DOCTYPE html>
<html lang="fr">
{{ template "head" . }}
<body>
    <main class="container">
        {{ template "nav" . }}

        <section>
            <h2>🏹 Inventaire du Matériel</h2>
            <p>Gestion des arcs d'initiation et de prêt.</p>

            <div class="grid">
                <article>
                    <header>
                        <h3>Poignées (Risers)</h3>
                    </header>
                    <details style="margin-bottom: 1rem;">
                        <summary role="button" class="secondary outline">➕ Ajouter une poignée</summary>
                        <form hx-post="/api/risers"
                              hx-ext="json-enc">
                            <div class="grid">
                                <label>Numéro de série <input type="text" name="numero_serie" placeholder="Ex: P-001" required></label>
                                <label>Marque <input type="text" name="marque"></label>
                                <label>Modèle <input type="text" name="modele"></label>
                            </div>
                            <div class="grid">
                                <label>Taille
                                    <select name="taille">
                                        <option value="21 pouces">21 pouces (Enfant)</option>
                                        <option value="23 pouces">23 pouces (Ado/Court)</option>
                                        <option value="25 pouces" selected>25 pouces (Standard)</option>
                                    </select>
                                </label>
                                <label>Latéralité
                                    <select name="lateralite">
                                        <option value="Droitier" selected>Droitier</option>
                                        <option value="Gaucher">Gaucher</option>
                                    </select>
                                </label>
                            </div>
                            <div class="grid">
                                <label>Couleur <input type="text" name="couleur" placeholder="EX: Jaune, Bleu/noir"></label>
                                <label>Année d'achat
                                    <input type="number"
                                        name="annee_achat"
                                        placeholder="AAAA, soit l'année sur 4 chiffres"
                                        min="1970"
                                        max="2500"
                                        step="1">
                                </label>
                                <label>Prix d'achat (€)
                                    <input type="number"
                                        name="prix"
                                        placeholder="0.00, soit le montant au centime près"
                                        min="0.00"
                                        step="0.01">
                                </label>
                            </div>
                            <label>Remarques <input type="text" name="remarques" placeholder="État général..."></label>
                            <div id="error-poignee" style="color: var(--pico-del-color); margin-bottom: 1rem; font-weight: bold;"></div>
                            <button type="submit">Enregistrer</button>
                        </form>
                    </details>
                    <figure>
                        <table class="striped">
                            <thead>
                                <tr>
                                    <th>Réf.</th>
                                    <th>Modèle</th>
                                    <th>Latéralité</th>
                                    <th>Taille</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{ range .poignees }}
                                <tr>
                                    <td><strong>{{ .NumeroSerie }}</strong></td>
                                    <td>{{ .Marque }} {{ .Modele }}</td>
                                    <td>{{ .Lateralite }}</td>
                                    <td>{{ .Taille }}</td>
                                    <td>
                                        <a href="/equipement/edit/riser/{{ .ID }}" role="button" class="outline" style="padding: 0.25rem 0.5rem; font-size: 0.8rem; margin-bottom: 0;" title="Modifier">
                                            ✏️
                                        </a>
                                        <button class="outline contrast"
                                                style="padding: 0.25rem 0.5rem; font-size: 0.8rem; margin-bottom: 0;"
                                                hx-delete="/api/risers/{{ .ID }}"
                                                hx-target="closest tr"
                                                hx-swap="delete"
                                                hx-confirm="Supprimer cette poignée?">
                                                🗑️
                                            </button>
                                    </td>
                                </tr>
                                {{ else }}
                                <tr><td colspan="4" style="text-align: center;">Aucune poignée en stock.</td></tr>
                                {{ end }}
                            </tbody>
                        </table>
                    </figure>
                </article>

                <article>
                    <header>
                        <h3>Branches (Limbs)</h3>
                    </header>
                    <details style="margin-bottom: 1rem;">
                        <summary role="button" class="secondary outline">➕ Ajouter des branches</summary>
                        <form hx-post="/api/limbs"
                              hx-ext="json-enc">
                            <div class="grid">
                                <label>Numéro de série <input type="text" name="numero_serie" placeholder="Ex: B-001" required></label>
                                <label>Marque <input type="text" name="marque"></label>
                            </div>
                            <div class="grid">
                                <label>Taille globale
                                    <select name="taille">
                                        <option value="66 pouces">66" (Courtes)</option>
                                        <option value="68 pouces" selected>68" (Moyennes)</option>
                                        <option value="70 pouces">70" (Longues)</option>
                                    </select>
                                </label>
                                <label>Puissance (lbs) <input type="number" name="puissance" required min="12" max="40" step="2" value="20"></label>
                            </div>
                            <label>Remarques <input type="text" name="remarques" placeholder="État général..."></label>
                            <div id="error-branche" style="color: var(--pico-del-color); margin-bottom: 1rem; font-weight: bold;"></div>
                            <button type="submit">Enregistrer</button>
                        </form>
                    </details>
                    <figure>
                        <table class="striped">
                            <thead>
                                <tr>
                                    <th>Réf.</th>
                                    <th>Modèle</th>
                                    <th>Puissance</th>
                                    <th>Taille</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{ range .branches }}
                                <tr>
                                    <td><strong>{{ .NumeroSerie }}</strong></td>
                                    <td>{{ .Marque }} {{ .Modele }}</td>
                                    <td>{{ .Puissance }} lbs</td>
                                    <td>{{ .Taille }}</td>
                                    <td>
                                        <a href="/equipement/edit/riser/{{ .ID }}" role="button" class="outline" style="padding: 0.25rem 0.5rem; font-size: 0.8rem; margin-bottom: 0;" title="Modifier">
                                            ✏️
                                        </a>
                                        <button class="outline contrast"
                                                style="padding: 0.25rem 0.5rem; font-size: 0.8rem; margin-bottom: 0;"
                                                hx-delete="/api/limbs/{{ .ID }}"
                                                hx-target="closest tr"
                                                hx-swap="delete"
                                                hx-confirm="Supprimer cette poignée?">
                                                🗑️
                                            </button>
                                    </td>
                                </tr>
                                {{ else }}
                                <tr><td colspan="4" style="text-align: center;">Aucune branche en stock.</td></tr>
                                {{ end }}
                            </tbody>
                        </table>
                    </figure>
                </article>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/json-enc.js"></script>
    <script>
        document.body.addEventListener('htmx:responseError', function(evt) {
            try {
                const response = JSON.parse(evt.detail.xhr.response);
                if (response.error) {
                    // On cherche si l'erreur vient du formulaire poignée ou branche
                    const form = evt.detail.elt;
                    const errorDiv = form.querySelector('[id^="error-"]');
                    if(errorDiv) errorDiv.innerText = "❌ " + response.error;
                }
            } catch (e) {
                console.error(e);
            }
        });

        document.body.addEventListener('htmx:beforeRequest', function(evt) {
            const form = evt.detail.elt;
            const errorDiv = form.querySelector('[id^="error-"]');
            if(errorDiv) errorDiv.innerText = "";
        });
    </script>
</body>
</html>
