<!DOCTYPE html>
<html lang="fr">
{{ template "head" . }}
<body>
    <main class="container">
        {{ template "nav" . }}
        <hr>
        <section>
            <div class="page-header">
                <div>
                    <h2>📄 Contrats de Location</h2>
                    <p class="secondary">Gestion des locations de matériel aux archers.</p>
                </div>
                <a href="/contracts/new" role="button">
                    ➕ Nouveau Contrat
                </a>
            </div>

            <figure>
                <table class="striped">
                    <thead>
                        <tr>
                            <th>Membre</th>
                            <th>Période</th>
                            <th>Matériel</th>
                            <th>État</th>
                            <th>Paiement</th>
                            <th>Statut Document</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{ if .Contracts }}
                            {{ range .Contracts }}
                            <tr>
                                <td><strong>{{ .Member.Prenom }} {{ .Member.Nom }}</strong></td>
                                <td>Du {{ .DateDebut.Format "02/01/2006" }}<br>Au {{ .DateFin.Format "02/01/2006" }}</td>
                                <td>
                                    {{ if .Riser.NumeroSerie }}
                                        🏹 Poignée (N° {{ .Riser.NumeroSerie }}{{ if .Riser.Marque }} - {{ .Riser.Marque }}{{ end }})
                                    {{ end }}

                                    {{ if and .Riser.NumeroSerie .Limb.NumeroSerie }}
                                        <br>+<br>
                                    {{ end }}

                                    {{ if .Limb.NumeroSerie }}
                                        🌿 Branches (N° {{ .Limb.NumeroSerie }}{{ if .Limb.Marque }} - {{ .Limb.Marque }}{{ end }})
                                    {{ end }}

                                    {{ if and (not .Riser.NumeroSerie) (not .Limb.NumeroSerie) }}
                                        <small class="secondary">Aucun arc (Accessoires uniquement)</small>
                                    {{ end }}
                                </td>
                                <td>
                                    {{ if eq .Statut "Actif" }}🟢 Actif
                                    {{ else if eq .Statut "Expiré" }}⚠️ Expiré
                                    {{ else if eq .Statut "Terminé" }}📦 Terminé
                                    {{ else if eq .Statut "Annulé" }}❌ Annulé
                                    {{ else }}🟣 {{ .Statut }}
                                    {{ end }}
                                </td>
                                <td>
                                    {{ if eq .EtatPaiement "Payé" }}
                                        <ins>Payé ({{ .ModePaiement }})</ins>
                                    {{ else }}
                                        <mark>En attente</mark>
                                    {{ end }}
                                </td>
                                <td>
                                    {{ if .RecuSigne }}
                                        <span data-tooltip="Contrat signé retourné par l'archer">✅ Signé</span>
                                    {{ else }}
                                        <span data-tooltip="Contrat en attente de signature">⏳ Attente signature</span>
                                    {{ end }}
                                </td>
                                <td>
                                    <a href="/contracts/{{ .ID }}" role="button" class="outline btn-compact">Détails</a>
                                </td>
                            </tr>
                            {{ end }}
                        {{ else }}
                            <tr>
                                <td colspan="7" class="text-center p-4">
                                    Aucun contrat de location pour le moment.
                                </td>
                            </tr>
                        {{ end }}
                    </tbody>
                </table>
            </figure>
        </section>
    </main>

    {{ template "footer" . }}
</body>
</html>
