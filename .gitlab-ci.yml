stages:
  - test
  - audit
  - build
  - release
  - deploy

variables:
  CGO_ENABLED: "0"
  GOLANG_VERSION: "1.26"

test:
  stage: test
  image: golang:$GOLANG_VERSION
  script:
    - go test ./...

govulncheck:
  stage: audit
  image: golang:$GOLANG_VERSION
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...

gosec:
  stage: audit
  image: golang:$GOLANG_VERSION
  script:
    - go install github.com/securego/gosec/v2/cmd/gosec@latest
    - gosec ./...

build_all:
  stage: build
  image: golang:$GOLANG_VERSION
  parallel:
    matrix:
      - GOOS: [linux, windows, darwin]
        GOARCH: [amd64, arm64]
  script:
    - sudo apt-get update && sudo apt-get install -y imagemagick tree zip
    - tree .
    - convert -background none "./images/sources/Icone_inkscape.svg" -define icon:auto-resize="16,32,48,128,256" "./static/favicon.ico"
    - mkdir -p dist
    # Syntaxe Bash pour définir l'extension
    - EXT=$([ "$GOOS" == "windows" ] && echo ".exe" || echo "")

    # LOGIQUE DE VERSIONNEMENT
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        # Si un tag est présent
        APP_VERSION="$CI_COMMIT_TAG"
      else
        # Sinon, date + pipeline ID
        APP_VERSION="$(date +'%Y%m%d')-build$CI_PIPELINE_IID"
      fi
    - echo "Compilation de la version $APP_VERSION"

    # INJECTION DANS LDFLAGS
    - LDFLAGS="-s -w -X 'github.com/deogracia/toxophilus/config.AppVersion=$APP_VERSION'"

    # Compilation
    - go build -ldflags="$LDFLAGS" -o dist/toxophilus-$GOOS-$GOARCH$EXT ./cmd/server/main.go
    - go build -ldflags="$LDFLAGS" -o dist/toxophilus_cli-$GOOS-$GOARCH$EXT ./cmd/toxophilus_cli/main.go
    - cp config-example.toml dist/

    # Création de l'archive
    - cd dist
    - |
      if [ "$GOOS" == "windows" ]; then
        zip -r ../toxophilus-$GOOS-$GOARCH.zip *
      else
        tar -czvf ../toxophilus-$GOOS-$GOARCH.tar.gz *
      fi
    - cd ..

  artifacts:
    name: "toxophilus-$GOOS-$GOARCH"
    paths:
      - dist/*.tar.gz
      - dist/*.zip
    expire_in: 1 week

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  # Ne s'exécute QUE sur un tag qui commence par "v" (ex: v1.0.0)
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
  script:
    - echo "Création de la page de Release GitLab pour le tag $CI_COMMIT_TAG"
  release:
    name: 'Toxophilus $CI_COMMIT_TAG'
    description: 'Release automatisée générée par GitLab CI'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_TAG'

deploy_alwaysdata:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+/
      when: manual  # Déclenchement manuel découplé (un-chained)
  script:
    - apk add --no-cache curl openssh-client tar
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H "$ALWAYSDATA_SSH_HOST" >> ~/.ssh/known_hosts
    
    # 1. Téléchargement autonome du binaire de la release de ce tag depuis GitHub
    - curl -s -L -o toxophilus-linux-amd64.tar.gz "https://github.com/deogracia/toxophilus/releases/download/${CI_COMMIT_TAG}/toxophilus-linux-amd64.tar.gz"
    
    # 2. Décompression
    - tar -xzvf toxophilus-linux-amd64.tar.gz -C ./
    
    # 3. Mise en pause du service Alwaysdata (is_disabled: true)
    - curl -s -X PATCH "https://api.alwaysdata.com/v1/service/$ALWAYSDATA_SERVICE_ID/" -u "$ALWAYSDATA_TOKEN:" -H "Content-Type: application/json" -d '{"is_disabled":true}'
    
    # 4. Copie des fichiers extraits de l'archive dans le dossier Alwaysdata
    - scp ./dist/toxophilus-linux-amd64 ./dist/toxophilus_cli-linux-amd64 ./dist/config-example.toml $ALWAYSDATA_ACCOUNT@$ALWAYSDATA_SSH_HOST:$ALWAYSDATA_SSH_PATH/
    
    # 5. Relance du service Alwaysdata (is_disabled: false)
    - curl -s -X PATCH "https://api.alwaysdata.com/v1/service/$ALWAYSDATA_SERVICE_ID/" -u "$ALWAYSDATA_TOKEN:" -H "Content-Type: application/json" -d '{"is_disabled":false}'
